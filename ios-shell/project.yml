name: MineradioApp
options:
  bundleIdPrefix: com.mineradio
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  defaultConfig: Debug
  groupSortPosition: top
settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    TARGETED_DEVICE_FAMILY: "1,2"               # iPhone + iPad
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO
    CODE_SIGN_IDENTITY: ""
    ENABLE_BITCODE: NO
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    GCC_TREAT_WARNINGS_AS_ERRORS: NO
targets:
  MineradioApp:
    type: application
    platform: iOS
    sources:
      - path: MineradioApp.swift
      - path: ContentView.swift
      - path: NativeAudioEngine.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mineradio.app
        PRODUCT_NAME: Mineradio
        INFOPLIST_KEY_CFBundleDisplayName: Mineradio
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIStatusBarHidden: YES
        INFOPLIST_KEY_UIRequiresFullScreen: YES
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.music"
        INFOPLIST_KEY_WEB_BASE_URL: "http://127.0.0.1:3001"
        INFOPLIST_KEY_UIBackgroundModes:
          - audio
          - fetch
          - processing
        GENERATE_INFOPLIST_FILE: YES
        ENABLE_PREVIEWS: NO
        SWIFT_EMIT_LOC_STRINGS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: ""
